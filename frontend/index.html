<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Bites Restaurant</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: #f5f5f5;
    }

    /* Header */
    header {
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092');
        background-size: cover;
        background-position: center;
        color: white;
        text-align: center;
        padding: 80px 20px;
    }

    header h1 {
        font-size: 50px;
    }

    header p {
        margin-top: 10px;
        font-size: 18px;
    }

    /* Navbar */
    nav {
        background: #111;
        display: flex;
        justify-content: center;
        padding: 15px;
    }

    nav a {
        color: white;
        margin: 0 20px;
        text-decoration: none;
        font-weight: 500;
    }

    nav a:hover {
        color: orange;
    }

    section {
        padding: 50px 20px;
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        font-size: 30px;
    }

    /* Menu Cards */
    .menu-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
    }

    .menu-card {
        background: white;
        border-radius: 15px;
        width: 250px;
        padding: 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        transition: 0.3s;
    }

    .menu-card:hover {
        transform: scale(1.05);
    }

    .menu-card img {
        width: 100%;
        border-radius: 10px;
    }

    .menu-card h3 {
        margin: 10px 0;
    }

    button {
        background: orange;
        border: none;
        padding: 10px 15px;
        color: white;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: darkorange;
    }

    /* Form */
    form {
        max-width: 400px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    footer {
        background: #111;
        color: white;
        text-align: center;
        padding: 15px;
    }

</style>
</head>

<body>

<header>
    <h1>🍽️ Royal Bites</h1>
    <p>Experience Taste Like Never Before</p>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#order">Order</a>
</nav>

<section id="home">
    <h2>Welcome</h2>
    <p>We serve fresh, delicious and high-quality food made with love ❤️</p>
</section>

<section id="menu">
    <h2>Our Menu</h2>

    <div class="menu-container">

        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1601924582975-7e9e0c1f3bfa">
            <h3>Pizza</h3>
            <p>Rs. 1200</p>
            <button onclick="orderItem('Pizza')">Order</button>
        </div>

        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
            <h3>Burger</h3>
            <p>Rs. 500</p>
            <button onclick="orderItem('Burger')">Order</button>
        </div>

        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0">
            <h3>Pasta</h3>
            <p>Rs. 800</p>
            <button onclick="orderItem('Pasta')">Order</button>
        </div>

    </div>
</section>

<section id="order">
    <h2>Place Your Order</h2>

    <form id="orderForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="text" id="food" placeholder="Food Item" required>
        <button type="submit">Submit Order</button>
    </form>

    <p id="response"></p>
</section>

<footer>
    <p>© 2026 Royal Bites | All Rights Reserved</p>
</footer>

<script>
function orderItem(item) {
    document.getElementById("food").value = item;
    window.location.href = "#order";
}

document.getElementById("orderForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const food = document.getElementById("food").value;

    fetch("https://restaurant-website-1p5e.onrender.com/order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, order: food })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("response").innerText = data.message;
    })
    .catch(err => {
        document.getElementById("response").innerText = "Error placing order!";
    });
});
</script>

</body>
</html>
